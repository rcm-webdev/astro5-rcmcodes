[build]
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "22.16.0"

# Redirect rules for form submissions  
[[redirects]]
  from = "/partner-success"
  to = "/partner/success/"
  status = 301

[[redirects]]
  from = "/partner"
  to = "/partner/"
  status = 301

[[redirects]]
  from = "/partner/success"
  to = "/partner/success/"
  status = 301

[[redirects]]
  from = "/links"
  to = "/links/"
  status = 301